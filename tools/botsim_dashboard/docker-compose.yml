# DUCKODUCKO bot-sim dashboard — a Grafana sidecar that visualises tools/botsim_dashboard/data/botsim_report.json
# Usage:  (from repo root, generate a report first)
#   godot --headless --path . -- --botsim --runs=30 --persona=skilled
#   cd tools/botsim_dashboard && docker compose up -d
#   open http://localhost:3000   (anonymous admin; dashboard "DUCKODUCKO Bot-Sim" is auto-provisioned)
services:
  fileserver:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./data:/usr/share/nginx/html:ro          # serves botsim_report.json on the internal network

  grafana:
    image: grafana/grafana-oss:11.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin                         # sign in with admin / admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource   # reads the JSON report directly (no DB)
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render  # PNG snapshots of panels/dashboards
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana       # persists in-UI tweaks across restarts
    depends_on:
      - fileserver
      - renderer

  renderer:
    image: grafana/grafana-image-renderer:latest
    restart: unless-stopped

volumes:
  grafana-storage:
